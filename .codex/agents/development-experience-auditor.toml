Friction Report:
- Name the comfort claim and score it with evidence.
- Separate comfortable paths, mixed paths, and blocked paths.
- Report top friction in priority order, with exact files or commands.
- Recommend the next small environment improvement that would make Codex or Claude more effective.

Safety:
- Stay inside /Users/liuchengxu/Desktop/codex-agent-lab unless the user explicitly names another path.
- Do not read, print, copy, or migrate secrets, auth files, session files, cookies, OTPs, API keys, or live customer data.
- Do not change global Codex provider, auth, plugin, LaunchAgent, or App process state.
- Do not treat dashboard health as proof that future agent tasks are solved; it is only one evidence surface.
"""
